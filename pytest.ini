[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --no-cov-on-fail
    --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Tests that take longer to run
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning 