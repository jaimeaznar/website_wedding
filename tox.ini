[tox]
envlist = 
    py39
    py310
    py311
    lint
isolated_build = True

[testenv]
description = run unit tests
deps =
    -r requirements.txt
commands =
    pytest {posargs:tests}

[testenv:lint]
description = run linters
skip_install = true
deps =
    flake8
    black
    isort
    mypy
    pylint
commands =
    flake8 {posargs:app tests}
    black --check {posargs:app tests}
    isort --check-only {posargs:app tests}
    mypy {posargs:app tests}
    pylint {posargs:app tests}

[flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude = 
    .git,
    __pycache__,
    build,
    dist,
    venv,
    htmlcov,
    .pytest_cache,
    .coverage,
    .env
per-file-ignores =
    __init__.py: F401
max-complexity = 10

[mypy]
python_version = 3.9
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
check_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True 